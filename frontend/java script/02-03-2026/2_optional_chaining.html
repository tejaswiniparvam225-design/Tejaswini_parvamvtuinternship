<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Optional Chaining in JS</h1>
    <p>?:</p>
    <script>
        let a = 100;
        let b = 400;
        let res = (a > b) ? true : false;//?:s
        console.log(res);

        const obj1 = {
            name:"SB",
            age:22,
            address:{
                city:"Bangalore",
                state:"Karnataka",
                country:"India"
            },
            marks: [20, 30, 40, 50, 60, 70, 80],
            isWorking: () => {
                console.log("yes he is working");
            }
        }
        console.log(obj1);
        console.log("name: ",obj1.name);
        console.log("country: ", obj1.address.country);
        console.log("country: ", obj1?.address1?.country);
        console.log("marks: ", obj1.marks1?.[4]);

    </script>
    
</body>
</html>
