<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>attribute in js</h1>
    <p>1.getattribute</p>
    <p>2.setattribute</p>

    <a href="https://www.google.com" target="_blank" id="link">google</a>
    <button id="btn">change</button>

    <script>
        const link=document.getElementById("btn").addEventListener("click",()=>{
 
            link.setAttribute( "href","https://www.amazon.in/" );
            link.textContent="amazon";
        })
    </script>
</body>
</html>
