<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Asynchronous in JS</h1>
    <p>By default js is synchronous - it will executes the program line by line</p>

    <p>Asynchronous is used in api calls, db queries, file handlings etc..</p>
    <p>1. setTimeout</p>
    <p>2. setInterval</p>
    <p>3. callback</p>
    <p>4. Promise</p>
    <p>5. async await</p>
    <p>6. fetch api</p>


    <script>
        //synchronous
        console.log("first");
        console.log("second");
        console.log("third");
        console.log("fourth");
        console.log("fifth");

        //asynchronous
        console.log("1");
        console.log("2");

        //thsi won't execute by js(browser will execute)
        setTimeout(() => {
            console.log("async");
        }, 3000);

        console.log("3");
        console.log("4");
    </script>
    
</body>
</html>
