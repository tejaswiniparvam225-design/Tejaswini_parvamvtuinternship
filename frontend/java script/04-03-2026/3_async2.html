<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>setInterval v/s setTimeout</h3>

    <script>
        console.log("first");

        setTimeout(()=>{
            console.log("Set Timeout called");
        }, 5000);

        console.log("second");

        setInterval(()=>{
            console.log("SetInterval called");
        }, 1000);
        
        console.log("third");
    </script>

    
</body>
</html>
