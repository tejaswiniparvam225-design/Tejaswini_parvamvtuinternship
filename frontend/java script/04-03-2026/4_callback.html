<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>callback in JS</h1>
    <p> callback is a function that is passed as parameter to another function</p>
    <p>callback hell - to overcome we use promise</p>

    <script>
        const fun1 = () => {
            console.log("First function");
        }
        const fun2 = ( )=> {
            console.log("Second function");
        }

        fun1(fun2);

        //use setTimeout

        setTimeout(()=>{
            console.log("1");
                    setTimeout(()=>{
                console.log("2");
                        setTimeout(()=>{
                    console.log("3");
                                setTimeout(()=>{
                            console.log("4");
                                    setTimeout(()=>{
                                console.log("5");
                                setTimeout(()=>{
                                    console.log("6");
                                },1000);
                            },1000);
                        },1000);
                    },1000);
                },1000);
            },1000);

    </script>
    
</body>
</html>
