<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }
    </style>
  </head>

  <body class="d-flex justify-content-center align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-4 col-md-6 col-sm-10">
          <div class="card shadow-lg text-center p-4 rounded-4">
            <h2 class="fw-bold mb-3">🌤 Weather App</h2>

            <div class="input-group mb-3">
              <input
                type="text"
                id="cityInput"
                class="form-control"
                placeholder="Enter city name"
              />
              <button class="btn btn-primary" id="searchBtn">Search</button>
            </div>

            <p class="text-danger d-none" id="error"></p>

            <div id="weatherBox" class="d-none">
              <img id="weatherIcon" class="img-fluid mb-2" width="120" />

              <h1 id="temp" class="fw-bold"></h1>
              <h4 id="city"></h4>
              <p id="description" class="text-muted"></p>

              <div class="row mt-4">
                <div class="col">
                  <div class="bg-light p-3 rounded">
                    <h5 id="humidity"></h5>
                    <p class="mb-0 text-muted">Humidity</p>
                  </div>
                </div>

                <div class="col">
                  <div class="bg-light p-3 rounded">
                    <h5 id="wind"></h5>
                    <p class="mb-0 text-muted">Wind</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const apiKey = "91ceea4cdaf95dcebd2a8f54f9b676ad";

      const cityInput = document.getElementById("cityInput");
      const searchBtn = document.getElementById("searchBtn");
      const error = document.getElementById("error");
      const weatherBox = document.getElementById("weatherBox");
      const weatherIcon = document.getElementById("weatherIcon");
      const temp = document.getElementById("temp");
      const city = document.getElementById("city");
      const descrition = document.getElementById("description");
      const humidity = document.getElementById("humidity");
      const wind = document.getElementById("wind");

      const getWeatherData = async (cityName) => {
        let url = `https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=${apiKey}`;

        try {
          const res = await fetch(url);
          if (!res.ok) {
            throw new Error("CITY NOT FOUND");
          }
          const response = await res.json();
          console.log(response);
          temp.innerText = Math.floor(response.main.temp - 273.15) + "°C";
          city.innerText = `${response.name},${response.sys.country}`;
          const icon = response.weather[0].icon;
          weatherIcon.src = `https://openweathermap.org/img/wn/${icon}@2x.png`;
          descrition.innerText = response.weather[0].descrition;
          humidity.innerText = response.main.humidity + "%";
          wind.innerText = response.wind.speed + "km/h";
          weatherBox.classList.remove("d-none");
        } catch (err) {
          error.innerText = err.message;
          error.classList.remove("d-none");
          weatherBox.classList.add("d-none");
        }
      };

      searchBtn.addEventListener("click", () => {
        const cityName = cityInput.value.trim();
        if (cityName === "") {
          error.innerText = "please enter city name";
          error.classList.remove("d-none");
          return;
        }
        getWeatherData(cityName);
        error.classList.add("d-none");
      });

      cityInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          searchBtn.click();
        }
      });
    </script>
  </body>
</html>
