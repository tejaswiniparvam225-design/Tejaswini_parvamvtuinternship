<body>
    <h1>user input in js</h1>
    <p>prompt</p>

    <script>
        const marks=+prompt("enter the marks");
        console.log("your marks is:",marks);
        console.log("type of marks is:", typeof marks);

        switch(marks){
            case 90:{
                console.log("A");
                break;

            }
             case 80:{
                console.log("B");
                break;

            }
             case 70:{
                console.log("C");
                break;

            }
            default:{
                console.log("D")
            }
        }
    </script>
