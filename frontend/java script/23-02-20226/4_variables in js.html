<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>variables in java script</h1>
    <P>4 ways to create a variables</P>
    <h3>1.automatically</h3>
    <h3>2.var keywords</h3>
    <h3>3.let keywords</h3>
    <h3>4.const keywords</h3>
    

    <script>
        //automatically
        first_name="avi";
        console.log("the first name is:",first_name);

         //var
         var last_name="naya";
        console.log("the last name is:",last_name);

        //let
        let age=20;
        console.log("age:",age);

        //const
        const pi=3.14
        console.log("pi:",pi)
    </script>

    <script>
        //re declaring variable
        var gender='m';
        console.log("gender:",gender);
        var gender='f';
        console.log("gender:",gender);

        let marks=90;
        console.log("marks:",marks);

        marks=89;
        console.log("marks:",marks);

        const country="india";
        console.log("country",country);

        
    </script>
</body>
</html>
