<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>display in js</h1>
    <P>1.console.log()-used to print the output in the console</P>
    <P> 2.window.alert()-used to display the output in alert box</P>
    <P>3.document.write()-used to display the output in the document</P>

    <button onclick="alterwindow()">window alert</button>
     <button onclick="documentwrite()"> document write</button>

     <script>
        function alterwindow(){
            window.alert("user clicked the button");
        }

        function documentwrite(){
            document.write("user clicked the button");
        }
     </script>

</body>
</html>
