<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h1> data types</h1>
    <h4>1.number</h4>
    <h4>2.strings</h4>
    <h4>3.boolean</h4>
    <h4>4.null</h4>
    <h4>5.undefined</h4>
    <h4>6.objects</h4>
    <h4>7.BidInt</h4>

    <script>
        //number
        let num=20;
        console.log("the number is:",num);
        console.log('the type of num is:',typeof num);

        //strings
        let str='hello';
        console.log("the string is:",str);
        console.log('the type of str is:',typeof str);

        //boolean
        let boolean=true;
         console.log("the boolean is:", boolean);
        console.log('the type of boolean is:',typeof boolean);

        //null
        let nullvalue=null;
         console.log("the nullvalue is:", nullvalue);
        console.log('the type of null is:',typeof nullvalue);

        //underfined
        let var_1;
        console.log("the value of var_1 is:", var_1);
        console.log('the type of var_1 is:',typeof var_1 );

        //object
        let obj=[1,2,3,4,5];
        console.log("the objectsis:", obj);
        console.log('the type of obj is:',typeof obj );


        //bigint
        let bigint=121n;
        console.log("the biging is:", bigint);
        console.log('the type of bigint is:',typeof bigint );



    </script>
</body>
