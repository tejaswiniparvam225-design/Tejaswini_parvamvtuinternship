<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>
<body>

<h2>Student Registration Form</h2>

<form>
    <label>First Name:</label><br>
    <input type="text" name="firstname"><br><br>

    <label>Last Name:</label><br>
    <input type="text" name="lastname"><br><br>

    <label>USN:</label><br>
    <input type="text" name="usn"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email"><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Other<br><br>

    <label>Course:</label><br>
    <select>
        <option>B.E</option>
        <option>B.Tech</option>
        <option>B.Sc</option>
        <option>BCA</option>
    </select><br><br>

    <label>Address:</label><br>
    <textarea rows="4" cols="30"></textarea><br><br>

    <label for="photo">Upload Photo:</label>
        <input type="file" name="photo" id="photo" accept="
        image/*" multiple><br><br>


        <label for="fav_color">Favourite Color</label>
        <input type="color" name="fav_color" id="fav_color"><br><br>


        <label for="rating">Rating</label>
        <input type="range" name="rating" min="1" max="5" id="rating" value="5"><br><br>


    <!-- Buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>

</body>
</html>
