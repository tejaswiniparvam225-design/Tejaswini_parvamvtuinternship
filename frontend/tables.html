
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Combined Column Table</title>

    <style>
        table {
            border-collapse: collapse;
            width: 70%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

<table>
    <tr>
        <th>Sl. No</th>
        <th>Name</th>
        <th>Role</th>
        <th colspan="2">Country & Team</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Virat</td>
        <td>Batsman</td>
        <td>India</td>
        <td>RCB</td>
    </tr>

    <tr>
        <td>2</td>
        <td>DDP</td>
        <td>Batsman</td>
        <td>India</td>
        <td>RCB</td>
    </tr>
</table>
<table>
    <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>
</table>

</body>
</html>
