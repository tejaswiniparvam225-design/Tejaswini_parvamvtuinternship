<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent{
            display:grid;
            /* repeat(count,size) */
            grid-template-columns: repeat(4,200px);
            grid-template-rows: repeat(4,250px);
            grid-row-gap: 10px;
            grid-column-gap: 20px;
            /* shorthand property for gap:single value:equal gap for row and column,two value:row gap and cloumn gap */
            grid-gap: 20px 30px;
            justify-items: center;
            align-items: center;
            justify-content: center;
        }
        .child{
            width: 200px;
            height:200px;
            background-color: aqua;
            color: black;
            font-size: 20px;
            border:1px solid white
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child child-1 ">child1</div>
        <div class="child child-2 ">child2</div>
        <div class="child child-3 ">child3</div>
        <div class="child child-4 ">child4</div>
        <div class="child child-5 ">child5</div>
        <div class="child child-6 ">child6</div>
        <div class="child child-7 ">child7</div>
        <div class="child child-8 ">child8</div>
        <div class="child child-9 ">child9</div>
        <div class="child child-10 ">child10</div>
    </div>
</body>
</html>
