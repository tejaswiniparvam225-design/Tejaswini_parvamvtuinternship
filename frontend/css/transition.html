<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outer-box{
            width: 500px;
            height: 500px;
            border:5px solid black;
        }
        .inner-box:hover{
            background-color: lightblue;
            transform: scale(1.2) translatey(100px) rotateX(30deg);
            color:brown;
            font-size: 50px;
            border-radius: 50%;

        }
        .inner-box{
            width: 100px;
            height: 100px;
            background-color: blueviolet;
            font-size: 30px;
            color: bisque;
            display: flex;
            justify-content: center;
            align-items: center;
            /* transition:transform 2s; */
            transition-property: transform ;
            transition-duration: 3s;
            transition-timing-function: ease-in;
        }
    </style>
</head>
<body>
    
    <div class="outer-box">
        <div class="inner-box">box</div>
    </div>
    
</body>
</html>
