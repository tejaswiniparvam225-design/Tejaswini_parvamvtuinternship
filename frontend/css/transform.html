<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 200px;
            height: 200px;
            background-color: blue;
            /* change the position in x axis:translatex(); */
            transform:translatex(100px) ;
             /* change the position in y axis:translatey(); */
            transform: translatey(100px);
             /* change the position in both axis:translate(x & y value); */
            transform: translate(200px , 200px);
            transform: scaleX(1.5);
            transform: translatex(100px)scalex(2);
            transform: translate(200px,200px)scaley(2);
            /* transform: rotate(25deg , 35deg,60deg); */
            transform: rotate3d(1,1,1,30deg);
            /* skew is used to strech the objects in diagonal way  */
            transform: skew(80deg , 50deg);

        }
    </style>
</head>
<body>
    <div class="box">

    </div>
</body>
</html>
