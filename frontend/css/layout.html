<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid Layout</title>
    <style>
         .grid-container{
            display: grid;
            height:500px;
            grid-template-columns: repeat(3,1fr);
            grid-gap:10px;
        }
       .item{
            background-color: crimson;
            color: white;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .green { background-color: #6dbb45; }
        .red { background-color: #ff4c3b; }
        .yellow { background-color: #ffb300; }

        /* Grid positioning */
        .item1 {
            grid-row: 1 / 5;
            grid-column: 1 / 2;
        }

        .item2 {
            grid-row: 1 / 2;
            grid-column: 2 / 3;
        }

        .item3 {
            grid-row: 1 / 2;
            grid-column: 3 / 4;
        }

        .item4 {
            grid-row: 2 / 3;
            grid-column: 2 / 3;
        }

        .item5 {
            grid-row: 2 / 3;
            grid-column: 3 / 4;
        }

        .item6 {
            grid-row: 3 / 4;
            grid-column: 2 / 3;
        }

        .item7 {
            grid-row: 3 / 4;
            grid-column: 3 / 4;
        }

        .item8 {
            grid-row: 4 / 5;
            grid-column: 2 / 4;
        }
    </style>
</head>
<body>

<div class="grid-container">
    <div class="item green item1">1</div>
    <div class="item green item2">2</div>
    <div class="item red item3">3</div>
    <div class="item yellow item4">4</div>
    <div class="item green item5">5</div>
    <div class="item red item6">6</div>
    <div class="item yellow item7">7</div>
    <div class="item green item8">8</div>
</div>

</body>
</html>
