<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .big-box{
            width: 1000px;
            height: 500px;
            background-color: red;
            display:flex;
            /* justify content:horizontal plane or x-axis (start,center,end,space-around,space evenly,space between*/
            justify-content: space-around;
            /* align-items(start,center,end) */
            align-items:end;
            /* flex-direction:row,row reverse,column,column-reverse ; */
            flex-wrap: wrap;
            align-content: space-around;
        }
         .small-box{
            width: 100px;
            height: 40px;
            background-color: green;
            border:1px solid white;
            font-size: 30px;
            color:yellow;
            text-align: center;
         }
        
    </style>
</head>
<body>
    <div class="big-box">
        <div class="small-box">1</div>
        <div class="small-box">2</div>
        <div class="small-box">3</div>
        <div class="small-box">4</div>
        <div class="small-box">5</div>
        <div class="small-box">6</div>
        <div class="small-box">7</div>
        <div class="small-box">8</div>
        <div class="small-box">9</div>
        <div class="small-box">10</div>
    </div>
</body>
</html>
